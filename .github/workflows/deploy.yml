name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths-ignore:
      - 'index.html'
      - 'assets/**'
      - '.nojekyll'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build
        env:
          GITHUB_REPOSITORY_NAME: ${{ github.event.repository.name }}

      - uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # 若 Pages 从 master 分支发布，同步构建产物到仓库根目录
      - name: Sync build to master root
        run: |
          cp dist/index.html index.html
          rm -rf assets
          cp -r dist/assets ./assets
          cp public/.nojekyll .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets .nojekyll
          if git diff --staged --quiet; then
            echo "No root sync changes"
            exit 0
          fi
          git commit -m "chore(pages): sync built site to root [skip ci]"
          git push
